name: tests

# Run the headless regression suite (game-client/tests) on every push + PR.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels the older in-flight run.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Keep in lockstep with the Godot version the project is developed against.
  GODOT_VERSION: "4.6.3"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cache the Godot binary + the project's imported resources (.godot) across runs.
      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Install Godot ${{ env.GODOT_VERSION }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/godot
          base="Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          url="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${base}.zip"
          curl -fsSL "$url" -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d ~/godot
          mv "$HOME/godot/${base}" "$HOME/godot/godot"
          chmod +x "$HOME/godot/godot"

      - name: Godot version
        run: $HOME/godot/godot --headless --version

      # First import builds .godot/ (resources + the global class cache the tests rely on).
      - name: Import project
        working-directory: game-client
        run: $HOME/godot/godot --headless --import || true

      - name: Run regression suite
        working-directory: game-client
        run: GODOT="$HOME/godot/godot" ./tests/run_tests.sh

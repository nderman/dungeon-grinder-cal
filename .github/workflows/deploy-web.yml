name: deploy-web

# Export the Godot project to a single-threaded HTML5 build and publish it to GitHub Pages.
# Single-threaded = no SharedArrayBuffer, so no COOP/COEP headers are needed and plain Pages serves it.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deploy needs these; only one deploy at a time.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-web
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.3"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }} + web export templates
        run: |
          set -euo pipefail
          base="Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          curl -fsSL "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${base}.zip" -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/${base}" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          curl -fsSL "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -o /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          tdir="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$tdir"
          mv /tmp/templates/templates/* "$tdir/"
          godot --headless --version

      # Bundle the PostHog publishable key into the build IF the secret is set (otherwise telemetry-free).
      # A `phc_` key is a write-only client key meant to ship in client builds; it's never committed.
      - name: Inject PostHog key (optional)
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: |
          if [ -n "${POSTHOG_API_KEY:-}" ]; then
            printf '%s' "$POSTHOG_API_KEY" > game-client/posthog.key
            echo "PostHog key bundled into the web build."
          else
            echo "No POSTHOG_API_KEY secret set — web build runs telemetry-free."
          fi

      - name: Import + export web build
        working-directory: game-client
        run: |
          set -euo pipefail
          godot --headless --import || true   # first import builds .godot/ (resource + class cache)
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html
          test -f build/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: game-client/build/web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
